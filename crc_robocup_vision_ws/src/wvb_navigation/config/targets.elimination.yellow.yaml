competition_behavior:
  ros__parameters:
    # Yellow robot starts from the yellow side and attacks only blue-side targets.
    # Normal targets use Tag36h11 ID 1; the blue base target uses ID 3.
    target_name:
      - T01_NorthMiddle
      - T03_WestAboveGate
      - T05_EastAboveGate
      - T02_NorthEast
      - BlueBaseTarget
    target_owner: ["blue", "blue", "blue", "blue", "blue"]
    target_x: [1.25, 0.30, 2.70, 2.45, 0.80]
    target_y: [2.28, 1.72, 1.72, 2.55, 2.20]
    target_yaw: [-1.57, 0.00, 3.14, -2.35, -0.85]
    target_tag_id: [1, 1, 1, 1, 3]
    home_x: 0.25
    home_y: 0.25
    home_yaw: 1.57

