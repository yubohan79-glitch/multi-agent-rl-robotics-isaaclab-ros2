competition_behavior:
  ros__parameters:
    auto_start: true
    map_frame: "map"
    cmd_vel_topic: "/cmd_vel"
    target_detection_topic: "/target_detection"
    navigate_action_name: "navigate_to_pose"
    team_color: "yellow"
    enforce_opponent_targets: true
    match_timeout_s: 180.0
    stationary_timeout_s: 20.0
    search_timeout_s: 6.0
    alignment_timeout_s: 5.0
    nav_retry_limit: 2
    search_angular_speed: 0.35
    kp_angular: 0.9
    kp_linear: 0.45
    max_angular_speed: 0.5
    max_linear_speed: 0.18
    target_center_tolerance: 0.08
    target_distance_m: 0.52
    target_distance_tolerance_m: 0.06
    localization_recovery_spin_s: 5.8
    localization_recovery_angular_speed: 0.55
    localization_recovery_limit: 2
    collision_recovery_cooldown_s: 2.0
    collision_accel_threshold: 4.0
    collision_yaw_rate_threshold: 2.4
    imu_topic: "/imu/data_raw"
    bumper_left_topic: "/bumper/front_left"
    bumper_right_topic: "/bumper/front_right"
    home_x: 0.0
    home_y: 0.0
    home_yaw: 0.0
