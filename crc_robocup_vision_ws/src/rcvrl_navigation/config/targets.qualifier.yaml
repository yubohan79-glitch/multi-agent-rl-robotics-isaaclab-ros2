competition_behavior:
  ros__parameters:
    # Qualification mode starts from the yellow area and attacks normal targets first,
    # then the blue base target. Normal targets keep owner=unknown so this
    # file can be used for one-robot qualification without filtering half the
    # field as "own" targets.
    target_name:
      - T01_NorthMiddle
      - T02_NorthEast
      - T05_EastAboveGate
      - T06_EastBelowGate
      - T07_SouthWest
      - T04_WestBelowGate
      - T03_WestAboveGate
      - T08_SouthMiddle
      - BlueBaseTarget
    target_owner: ["unknown", "unknown", "unknown", "unknown", "unknown", "unknown", "unknown", "unknown", "blue"]
    target_x: [1.92, 2.68, 2.70, 2.70, 0.32, 0.30, 0.30, 1.08, 0.23]
    target_y: [2.52, 2.68, 1.84, 1.16, 0.32, 1.16, 1.84, 0.48, 2.31]
    target_yaw: [2.36, 0.79, -0.79, 0.79, -2.36, 2.36, -2.36, -0.79, 1.73]
    target_tag_id: [1, 1, 1, 1, 1, 1, 1, 1, 3]
    home_x: 0.0
    home_y: 0.0
    home_yaw: 0.0
