competition_behavior:
  ros__parameters:
    # Backward-compatible default: yellow robot attacks blue-side targets only.
    # Prefer targets.elimination.yellow.yaml or targets.elimination.blue.yaml
    # for explicit team selection.
    target_name:
      - T01_NorthMiddle
      - T03_WestAboveGate
      - T05_EastAboveGate
      - T02_NorthEast
      - BlueBaseTarget
    target_owner: ["blue", "blue", "blue", "blue", "blue"]
    # Nav2 standoff poses in the 3 m map frame. They mirror the current
    # IsaacLab target layout: target_x/y are not target centers; yaw faces the
    # target before camera alignment starts.
    target_x: [1.92, 0.30, 2.70, 2.68, 0.23]
    target_y: [2.52, 1.84, 1.84, 2.68, 2.31]
    target_yaw: [2.36, -2.36, -0.79, 0.79, 1.73]
    target_tag_id: [1, 1, 1, 1, 3]
    home_x: 0.25
    home_y: 0.25
    home_yaw: 1.57
