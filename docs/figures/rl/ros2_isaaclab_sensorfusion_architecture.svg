<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850">
  <defs>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#7A869A"/></marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#0072B2"/></marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#009E73"/></marker>

    <style>
      text{font-family:Inter,Arial,Helvetica,sans-serif}
      .title{font-size:34px;font-weight:700;fill:#1B1F23}
      .subtitle{font-size:15px;font-weight:400;fill:#5B6472}
      .label{font-size:15px;font-weight:650;fill:#1B1F23}
      .body{font-size:13px;font-weight:400;fill:#5B6472}
      .small{font-size:11px;font-weight:400;fill:#5B6472}
      .tiny{font-size:9px;font-weight:500;fill:#5B6472}
      .panel{fill:#fff;stroke:#C9D1D9;stroke-width:1.2}
      .soft{fill:#F7F9FB;stroke:#C9D1D9;stroke-width:1}
      .grid{stroke:#E6EBF0;stroke-width:1}
      .axis{stroke:#1B1F23;stroke-width:1.1}
      .wire{fill:none;stroke:#7A869A;stroke-width:1.8;marker-end:url(#arrowGray)}
      .wireBlue{fill:none;stroke:#0072B2;stroke-width:2;marker-end:url(#arrowBlue)}
      .wireGreen{fill:none;stroke:#009E73;stroke-width:2;marker-end:url(#arrowGreen)}
      .dash{stroke-dasharray:6 6}
    </style>

  </defs>
  <rect width="1600" height="850" fill="#FFFFFF"/>
  <text class="title" x="64" y="58">ROS2 + IsaacLab Sensor-Fusion Interface</text>
  <text class="subtitle" x="66" y="86">A compact observation contract keeps the learned policy deployable outside the simulator.</text>

  <rect class="soft" x="58.0" y="120.0" width="1484.0" height="670.0" rx="10.0"/>
  <rect class="panel" x="110.0" y="230.0" width="320.0" height="320.0" rx="6.0"/>
  <text class="label" x="145.0" y="275.0" text-anchor="start">Physical sensors</text>
  <text class="body" x="145.0" y="320.0" text-anchor="start">wheel odom</text>
<text class="body" x="145.0" y="342.0" text-anchor="start">IMU yaw rate</text>
<text class="body" x="145.0" y="364.0" text-anchor="start">2D lidar</text>
<text class="body" x="145.0" y="386.0" text-anchor="start">camera / AprilTag</text>
<text class="body" x="145.0" y="408.0" text-anchor="start">ToF + bumper</text>
  <path class="wireBlue" d="M430.0 390.0 L570.0 390.0"/>
  <rect class="panel" x="570.0" y="210.0" width="360.0" height="360.0" rx="6.0"/>
  <text class="label" x="610.0" y="255.0" text-anchor="start">Fusion features</text>
  <text class="body" x="610.0" y="302.0" text-anchor="start">motion consistency</text>
<text class="body" x="610.0" y="324.0" text-anchor="start">scan clearance</text>
<text class="body" x="610.0" y="346.0" text-anchor="start">front contact</text>
<text class="body" x="610.0" y="368.0" text-anchor="start">target visibility</text>
<text class="body" x="610.0" y="390.0" text-anchor="start">EKF confidence</text>
  <path class="wireGreen" d="M930.0 390.0 L1070.0 390.0"/>
  <rect class="panel" x="1070.0" y="230.0" width="340.0" height="320.0" rx="6.0"/>
  <text class="label" x="1110.0" y="275.0" text-anchor="start">Policy observation</text>
  <text class="body" x="1110.0" y="320.0" text-anchor="start">46-D local vector</text>
<text class="body" x="1110.0" y="342.0" text-anchor="start">no privileged state</text>
<text class="body" x="1110.0" y="364.0" text-anchor="start">domain-randomized noise</text>
<text class="body" x="1110.0" y="386.0" text-anchor="start">action shield records</text>
  <rect class="panel" x="265.0" y="635.0" width="980.0" height="56.0" rx="6.0"/>
  <text class="body" x="300.0" y="670.0" text-anchor="start">Design goal: same fields are observable in simulation, ROS2 dry-run and real-robot logging.</text>

</svg>
