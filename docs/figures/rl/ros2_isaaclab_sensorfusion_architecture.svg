<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>
.title{font:700 36px Arial, sans-serif;fill:#172033}.sub{font:18px Arial,sans-serif;fill:#667085}.h{font:700 22px Arial,sans-serif;fill:#172033}.txt{font:16px Arial,sans-serif;fill:#344054}.small{font:13px Arial,sans-serif;fill:#667085}.mono{font:13px Consolas,monospace;fill:#344054}
</style><rect width="100%" height="100%" fill="#FFFFFF"/>
<text x="70" y="70" class="title">Embodied ROS2-IsaacLab-RL Architecture</text>
<text x="70" y="104" class="sub">ROS1 Mini contracts were ported to ROS2 and used to calibrate the IsaacLab self-play policy.</text>
<rect x="80" y="170" width="360" height="520" rx="8" fill="#EFF6FF" stroke="#93C5FD"/><text x="120" y="220" class="h">Sensors</text>
<text x="120" y="270" class="txt">/wheel/odom</text><text x="120" y="310" class="txt">/imu/data_raw</text><text x="120" y="350" class="txt">/scan</text><text x="120" y="390" class="txt">/target_detection</text><text x="120" y="430" class="txt">bumper / contact</text>
<rect x="560" y="170" width="400" height="520" rx="8" fill="#F0FDF4" stroke="#86EFAC"/><text x="600" y="220" class="h">Fusion and Behavior</text>
<text x="600" y="270" class="txt">robot_localization EKF</text><text x="600" y="310" class="txt">motion drift recorder</text><text x="600" y="350" class="txt">competition_behavior</text><text x="600" y="390" class="txt">0.80 s laser dwell gate</text><text x="600" y="430" class="txt">opponent-target safety</text>
<rect x="1080" y="170" width="430" height="520" rx="8" fill="#FFF7ED" stroke="#FDBA74"/><text x="1120" y="220" class="h">IsaacLab / MAPPO</text>
<text x="1120" y="270" class="txt">two-agent self-play</text><text x="1120" y="310" class="txt">differential-drive limits</text><text x="1120" y="350" class="txt">pushable rigid boxes</text><text x="1120" y="390" class="txt">off-axis base rush</text><text x="1120" y="430" class="txt">strict replay audit</text>
<path d="M440 430 C500 430 500 430 560 430" stroke="#172033" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M960 430 C1020 430 1020 430 1080 430" stroke="#172033" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#172033"/></marker></defs>
<rect x="260" y="760" width="1060" height="90" rx="8" fill="#F7F9FC" stroke="#C8D2E0"/>
<text x="300" y="814" class="txt">Deployment action: high-level policy selects target/base rush/block/recovery/fire; ROS2 behavior and Nav2 execute safe low-level motion and shooter services.</text>
