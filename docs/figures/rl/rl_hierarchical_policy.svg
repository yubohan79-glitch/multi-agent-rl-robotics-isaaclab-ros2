<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#7A869A"/></marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#0072B2"/></marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#009E73"/></marker>

    <style>
      text{font-family:Inter,Arial,Helvetica,sans-serif}
      .title{font-size:34px;font-weight:700;fill:#1B1F23}
      .subtitle{font-size:15px;font-weight:400;fill:#5B6472}
      .label{font-size:15px;font-weight:650;fill:#1B1F23}
      .body{font-size:13px;font-weight:400;fill:#5B6472}
      .small{font-size:11px;font-weight:400;fill:#5B6472}
      .tiny{font-size:9px;font-weight:500;fill:#5B6472}
      .panel{fill:#fff;stroke:#C9D1D9;stroke-width:1.2}
      .soft{fill:#F7F9FB;stroke:#C9D1D9;stroke-width:1}
      .grid{stroke:#E6EBF0;stroke-width:1}
      .axis{stroke:#1B1F23;stroke-width:1.1}
      .wire{fill:none;stroke:#7A869A;stroke-width:1.8;marker-end:url(#arrowGray)}
      .wireBlue{fill:none;stroke:#0072B2;stroke-width:2;marker-end:url(#arrowBlue)}
      .wireGreen{fill:none;stroke:#009E73;stroke-width:2;marker-end:url(#arrowGreen)}
      .dash{stroke-dasharray:6 6}
    </style>

  </defs>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <text class="title" x="64" y="58">Hierarchical MAPPO Strategy</text>
  <text class="subtitle" x="66" y="86">Local actors choose tactics, safety gates enforce rules, and ROS2 controllers execute low-level motion.</text>

  <rect class="soft" x="64.0" y="126.0" width="1468.0" height="650.0" rx="10.0"/>
  <rect class="panel" x="120.0" y="230.0" width="280.0" height="340.0" rx="6.0"/>
  <text class="label" x="150.0" y="270.0" text-anchor="start">Local observation</text>
  <text class="body" x="150.0" y="315.0" text-anchor="start">pose and heading</text>
<text class="body" x="150.0" y="337.0" text-anchor="start">opponent bearing</text>
<text class="body" x="150.0" y="359.0" text-anchor="start">armor / score / time</text>
<text class="body" x="150.0" y="381.0" text-anchor="start">target visibility</text>
<text class="body" x="150.0" y="403.0" text-anchor="start">sensor-fusion state</text>
  <path class="wireBlue" d="M400.0 400.0 L540.0 400.0"/>
  <rect class="panel" x="540.0" y="190.0" width="360.0" height="420.0" rx="6.0"/>
  <text class="label" x="580.0" y="235.0" text-anchor="start">Decentralized actor</text>
  <circle cx="630" cy="320" r="14" fill="#fff" stroke="#0072B2" stroke-width="2"/>
  <circle cx="715" cy="285" r="14" fill="#fff" stroke="#0072B2" stroke-width="2"/>
  <circle cx="715" cy="355" r="14" fill="#fff" stroke="#0072B2" stroke-width="2"/>
  <circle cx="800" cy="320" r="14" fill="#fff" stroke="#0072B2" stroke-width="2"/>
  <path d="M644 320 L701 285 M644 320 L701 355 M729 285 L786 320 M729 355 L786 320" stroke="#C9D1D9" stroke-width="1.7"/>
  <text class="body" x="580.0" y="440.0" text-anchor="start">6-D tactical output</text>
<text class="body" x="580.0" y="462.0" text-anchor="start">target selector</text>
<text class="body" x="580.0" y="484.0" text-anchor="start">base-rush / block / recover / fire</text>
  <path class="wireBlue" d="M900.0 400.0 L1040.0 400.0"/>
  <rect class="panel" x="1040.0" y="230.0" width="350.0" height="340.0" rx="6.0"/>
  <text class="label" x="1080.0" y="270.0" text-anchor="start">Rule and safety shield</text>
  <text class="body" x="1080.0" y="315.0" text-anchor="start">opponent target only</text>
<text class="body" x="1080.0" y="337.0" text-anchor="start">line-of-sight blockers</text>
<text class="body" x="1080.0" y="359.0" text-anchor="start">dwell and range gate</text>
<text class="body" x="1080.0" y="381.0" text-anchor="start">contact hull guard</text>
  <path d="M1198 435 l56 24 v70 c0 40 -30 68 -56 82 c-26 -14 -56 -42 -56 -82 v-70 z" fill="#fff" stroke="#D55E00" stroke-width="2"/>
  <path class="wireGreen" d="M1215.0 570.0 L1215.0 680.0"/>
  <text class="label" x="1120.0" y="715.0" text-anchor="start">ROS2 behavior / Nav2 / shooter execution</text>
  <path class="wire dash" d="M720 190 C760 105 980 105 1160 230"/>
  <text class="body" x="830.0" y="145.0" text-anchor="start">central critic is used only during training</text>

</svg>
