      <text class="tiny" x="631.0" y="668.0" text-anchor="middle">B4</text>
    
  <rect class="panel" x="880" y="130" width="790" height="650"/>
  <text class="h" x="915" y="175">Base hit success by normal-target count</text>
  <line class="axis" x1="930" y1="650" x2="1600" y2="650"/>

      <rect x="970.0" y="650.0" width="42.0" height="0.0" rx="4" fill="#E5B82E"/>
      <text class="tiny" x="991.0" y="642.0" text-anchor="middle">0%/0</text>
      <text class="tiny" x="991.0" y="668.0" text-anchor="middle">Y1</text>
    
