      <text class="tiny" x="1333.0" y="668.0" text-anchor="middle">B3</text>
    
      <rect x="1457.0" y="650.0" width="42.0" height="0.0" rx="4" fill="#2563EB"/>
      <text class="tiny" x="1478.0" y="642.0" text-anchor="middle">0%/0</text>
