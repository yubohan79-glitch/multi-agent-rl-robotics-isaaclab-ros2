      <text class="tiny" x="581.0" y="668.0" text-anchor="middle">Y4</text>
    
      <rect x="205.0" y="641.1" width="42.0" height="8.9" rx="4" fill="#2563EB"/>
      <text class="tiny" x="226.0" y="633.1" text-anchor="middle">2%</text>
      <text class="tiny" x="226.0" y="668.0" text-anchor="middle">B1</text>
    
      <rect x="340.0" y="382.8" width="42.0" height="267.2" rx="4" fill="#2563EB"/>
      <text class="tiny" x="361.0" y="374.8" text-anchor="middle">70%</text>
      <text class="tiny" x="361.0" y="668.0" text-anchor="middle">B2</text>
    
      <rect x="475.0" y="546.1" width="42.0" height="103.9" rx="4" fill="#2563EB"/>
      <text class="tiny" x="496.0" y="538.1" text-anchor="middle">27%</text>
      <text class="tiny" x="496.0" y="668.0" text-anchor="middle">B3</text>
    
