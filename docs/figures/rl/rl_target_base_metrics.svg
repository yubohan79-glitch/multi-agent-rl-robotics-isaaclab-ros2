      <text class="tiny" x="311.0" y="668.0" text-anchor="middle">Y2</text>
    
      <rect x="425.0" y="549.1" width="42.0" height="100.9" rx="4" fill="#E5B82E"/>
      <text class="tiny" x="446.0" y="541.1" text-anchor="middle">27%</text>
      <text class="tiny" x="446.0" y="668.0" text-anchor="middle">Y3</text>
    
      <rect x="560.0" y="647.0" width="42.0" height="3.0" rx="4" fill="#E5B82E"/>
