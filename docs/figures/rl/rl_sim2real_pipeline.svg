<rect class="soft" x="64.0" y="126.0" width="1468.0" height="650.0" rx="10.0"/><rect class="panel" x="115.0" y="295.0" width="220.0" height="150.0" rx="6.0"/><text class="label" x="139.0" y="345.0" text-anchor="start">IsaacLab scene</text><text class="body" x="139.0" y="382.0" text-anchor="start">rigid bodies, targets, sensors</text><path class="wireBlue" d="M335.0 370.0 L395.0 370.0"/><rect class="panel" x="400.0" y="295.0" width="220.0" height="150.0" rx="6.0"/><text class="label" x="424.0" y="345.0" text-anchor="start">Rule env</text><text class="body" x="424.0" y="382.0" text-anchor="start">fast MAPPO rollout</text><path class="wireBlue" d="M620.0 370.0 L680.0 370.0"/><rect class="panel" x="685.0" y="295.0" width="220.0" height="150.0" rx="6.0"/><text class="label" x="709.0" y="345.0" text-anchor="start">Policy export</text><text class="body" x="709.0" y="382.0" text-anchor="start">TorchScript / ONNX actor</text><path class="wireBlue" d="M905.0 370.0 L965.0 370.0"/><rect class="panel" x="970.0" y="295.0" width="220.0" height="150.0" rx="6.0"/><text class="label" x="994.0" y="345.0" text-anchor="start">ROS2 runtime</text><text class="body" x="994.0" y="382.0" text-anchor="start">Nav2, vision, shooter</text><path class="wireBlue" d="M1190.0 370.0 L1250.0 370.0"/><rect class="panel" x="1255.0" y="295.0" width="220.0" height="150.0" rx="6.0"/><text class="label" x="1279.0" y="345.0" text-anchor="start">Field logs</text><text class="body" x="1279.0" y="382.0" text-anchor="start">bags, drift, replay audit</text><path class="wire dash" d="M1260 445 C1260 610 250 610 250 445"/><text class="body" x="595.0" y="650.0" text-anchor="start">calibration feedback: sensor noise, contact margins and action shields</text><rect class="panel" x="430.0" y="170.0" width="730.0" height="68.0" rx="6.0"/><text class="label" x="470.0" y="214.0" text-anchor="start">No privileged simulator state crosses into deployment</text>
