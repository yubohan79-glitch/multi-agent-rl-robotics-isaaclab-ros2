<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg{fill:#fff}.title{font:700 38px Arial,Inter,sans-serif;fill:#111827}.sub{font:500 16px Arial,Inter,sans-serif;fill:#64748b}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.sim{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.buffer{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}.learn{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2}.policy{fill:#fffbeb;stroke:#d6a90e;stroke-width:2}
      .h{font:700 22px Arial,Inter,sans-serif;fill:#1f2937}.mh{font:700 16px Arial,Inter,sans-serif;fill:#334155}.txt{font:500 14px Arial,Inter,sans-serif;fill:#475569}.small{font:600 12px Arial,Inter,sans-serif;fill:#475569}.tiny{font:700 10px Arial,Inter,sans-serif;fill:#475569}.eq{font:600 15px Consolas,Menlo,monospace;fill:#111827}
      .arena{fill:#fff;stroke:#111827;stroke-width:2}.grid{stroke:#e2e8f0;stroke-width:.9;stroke-dasharray:4 5}.obs{fill:#fee2e2;stroke:#ef4444;stroke-width:1.3;stroke-dasharray:4 3}.robotY{fill:#f2c94c;stroke:#92400e;stroke-width:1.3}.robotB{fill:#2563eb;stroke:#1e3a8a;stroke-width:1.3}.target{fill:#fff;stroke:#334155;stroke-width:1.4}
      .arrow{fill:none;stroke:#64748b;stroke-width:3;marker-end:url(#ad)}.arrowB{fill:none;stroke:#2563eb;stroke-width:4;marker-end:url(#ab)}.arrowG{fill:none;stroke:#16a34a;stroke-width:4;marker-end:url(#ag)}.arrowR{fill:none;stroke:#e11d48;stroke-width:4;marker-end:url(#ar)}.arrowY{fill:none;stroke:#d6a90e;stroke-width:3.5;marker-end:url(#ay)}.dash{stroke-dasharray:9 8}.blue{fill:#1d4ed8}.green{fill:#15803d}.red{fill:#be123c}.yellow{fill:#a16207}
    </style>
    <marker id="ad" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#64748b"/></marker>
    <marker id="ab" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#16a34a"/></marker>
    <marker id="ar" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#e11d48"/></marker>
    <marker id="ay" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#d6a90e"/></marker>
    <g id="miniArena">
      <rect class="arena" x="0" y="0" width="132" height="92"/>
      <path class="grid" d="M44 0 V92 M88 0 V92 M0 31 H132 M0 62 H132"/>
      <rect x="0" y="0" width="26" height="26" fill="#dbeafe" stroke="#2563eb" stroke-width="1.3"/>
      <rect x="106" y="66" width="26" height="26" fill="#fef3c7" stroke="#d6a90e" stroke-width="1.3"/>
      <rect class="obs" x="52" y="26" width="18" height="18"/>
      <circle class="target" cx="126" cy="18" r="6"/><circle class="target" cx="8" cy="80" r="6"/>
      <path class="robotB" d="M48 22 l-18 -8 l18 -8 z"/><path class="robotY" d="M86 68 l18 8 l-18 8 z"/>
    </g>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="76" y="66">Scalable MAPPO Self-Play Training</text>
  <text class="sub" x="78" y="98">Parallel RoboCup arenas collect two-agent rollouts; a centralized critic updates deployable yellow/blue actors.</text>

  <rect class="panel" x="60" y="132" width="1680" height="880" rx="14"/>

  <g transform="translate(96 172)">
    <rect class="sim" x="0" y="0" width="560" height="470" rx="12"/>
    <text class="h" x="26" y="42">A. Vectorized Self-Play Arenas</text>
    <text class="txt" x="26" y="70">randomized starts, target visibility, contacts and latency</text>
    <g transform="translate(42 116)">
      <g><use href="#miniArena"/><text class="tiny blue" x="66" y="-12" text-anchor="middle">env 01</text></g>
      <g transform="translate(180 0)"><use href="#miniArena"/><text class="tiny blue" x="66" y="-12" text-anchor="middle">env 02</text></g>
      <g transform="translate(360 0)"><use href="#miniArena"/><text class="tiny blue" x="66" y="-12" text-anchor="middle">env 03</text></g>
      <g transform="translate(0 154)"><use href="#miniArena"/><text class="tiny blue" x="66" y="-12" text-anchor="middle">env 04</text></g>
      <g transform="translate(180 154)"><use href="#miniArena"/><text class="tiny blue" x="66" y="-12" text-anchor="middle">...</text></g>
      <g transform="translate(360 154)"><use href="#miniArena"/><text class="tiny blue" x="66" y="-12" text-anchor="middle">env N</text></g>
    </g>
    <g transform="translate(42 396)">
      <rect class="card" x="0" y="0" width="138" height="40" rx="6"/><text class="small" x="69" y="25" text-anchor="middle">async reset</text>
      <rect class="card" x="160" y="0" width="138" height="40" rx="6"/><text class="small" x="229" y="25" text-anchor="middle">rule engine</text>
      <rect class="card" x="320" y="0" width="138" height="40" rx="6"/><text class="small" x="389" y="25" text-anchor="middle">sensor noise</text>
    </g>
  </g>

  <path class="arrowG" d="M676 405 H760"/><text class="tiny green" x="718" y="388" text-anchor="middle">N x T rollout</text>

  <g transform="translate(770 172)">
    <rect class="buffer" x="0" y="0" width="360" height="470" rx="12"/>
    <text class="h" x="26" y="42">B. Rollout Buffer</text>
    <text class="txt" x="26" y="70">batched yellow/blue trajectories</text>
    <rect class="card" x="36" y="120" width="288" height="122" rx="8"/>
    <text class="mh green" x="62" y="152">trajectory tensor</text>
    <text class="eq" x="62" y="190">o_y, o_b, a_y, a_b</text>
    <text class="eq" x="62" y="222">r_y, r_b, done, logp</text>
    <g transform="translate(36 288)">
      <rect class="card" x="0" y="0" width="132" height="36" rx="6"/><text class="small" x="66" y="23" text-anchor="middle">normal hit</text>
      <rect class="card" x="156" y="0" width="132" height="36" rx="6"/><text class="small" x="222" y="23" text-anchor="middle">armor removed</text>
      <rect class="card" x="0" y="54" width="132" height="36" rx="6"/><text class="small" x="66" y="77" text-anchor="middle">base hit</text>
      <rect class="card" x="156" y="54" width="132" height="36" rx="6"/><text class="small red" x="222" y="77" text-anchor="middle">own fire</text>
    </g>
    <rect class="card" x="36" y="410" width="288" height="38" rx="6"/><text class="eq green" x="180" y="434" text-anchor="middle">A_hat = GAE(r, V, done)</text>
  </g>

  <path class="arrowR" d="M1148 405 H1232"/><text class="tiny red" x="1190" y="388" text-anchor="middle">advantage + batch</text>

  <g transform="translate(1242 172)">
    <rect class="learn" x="0" y="0" width="430" height="470" rx="12"/>
    <text class="h" x="26" y="42">C. MAPPO Learner</text>
    <text class="txt" x="26" y="70">central critic updates local actors</text>
    <rect class="card" x="44" y="112" width="342" height="76" rx="8"/><text class="mh" x="215" y="143" text-anchor="middle">Central critic V(s_global)</text><text class="small" x="215" y="166" text-anchor="middle">training only</text>
    <rect class="card" x="44" y="230" width="150" height="58" rx="8"/><text class="mh yellow" x="119" y="256" text-anchor="middle">pi_y(o_y)</text><text class="tiny" x="119" y="276" text-anchor="middle">yellow actor</text>
    <rect class="card" x="236" y="230" width="150" height="58" rx="8"/><text class="mh blue" x="311" y="256" text-anchor="middle">pi_b(o_b)</text><text class="tiny" x="311" y="276" text-anchor="middle">blue actor</text>
    <rect class="card" x="44" y="330" width="342" height="42" rx="6"/><text class="small" x="215" y="356" text-anchor="middle">clipped actor loss + value loss + entropy</text>
    <rect class="card" x="44" y="396" width="342" height="38" rx="6"/><text class="mh red" x="215" y="421" text-anchor="middle">updated actor parameters</text>
  </g>

  <path class="arrowY dash" d="M1456 682 C1160 714 720 714 376 682"/>
  <text class="tiny yellow" x="908" y="728" text-anchor="middle">broadcast updated actors to all parallel arenas</text>

  <g transform="translate(96 740)">
    <rect class="card" x="0" y="0" width="720" height="190" rx="10"/>
    <text class="h" x="28" y="42">D. Training Diagnostics</text>
    <g transform="translate(60 74)">
      <line x1="0" y1="90" x2="210" y2="90" stroke="#94a3b8" stroke-width="2"/><line x1="0" y1="90" x2="0" y2="0" stroke="#94a3b8" stroke-width="2"/>
      <path d="M6 82 C48 70 86 48 126 36 C158 24 184 12 206 8" fill="none" stroke="#2563eb" stroke-width="3"/>
      <path d="M6 88 C48 84 86 70 126 52 C158 38 184 28 206 22" fill="none" stroke="#16a34a" stroke-width="3"/>
      <text class="tiny" x="105" y="120" text-anchor="middle">win rate / hit rate</text>
    </g>
    <g transform="translate(390 74)">
      <line x1="0" y1="90" x2="210" y2="90" stroke="#94a3b8" stroke-width="2"/><line x1="0" y1="90" x2="0" y2="0" stroke="#94a3b8" stroke-width="2"/>
      <path d="M6 10 C52 18 82 42 118 62 C146 78 174 86 206 88" fill="none" stroke="#e11d48" stroke-width="3"/>
      <text class="tiny" x="105" y="120" text-anchor="middle">unsafe events</text>
    </g>
  </g>

  <g transform="translate(900 740)">
    <rect class="card" x="0" y="0" width="772" height="190" rx="10"/>
    <text class="h" x="28" y="42">E. Rule-Grounded Curriculum</text>
    <text class="txt" x="28" y="82">+ normal target hit, armor removal, base hit win</text>
    <text class="txt" x="28" y="118">- own target, blind fire, stuck, unsafe base collision</text>
    <text class="txt" x="28" y="154">curriculum: navigation -> target hit -> two-agent tactics -> recovery</text>
  </g>
</svg>
