<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#7A869A"/></marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#0072B2"/></marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#009E73"/></marker>

    <style>
      text{font-family:Inter,Arial,Helvetica,sans-serif}
      .title{font-size:34px;font-weight:700;fill:#1B1F23}
      .subtitle{font-size:15px;font-weight:400;fill:#5B6472}
      .label{font-size:15px;font-weight:650;fill:#1B1F23}
      .body{font-size:13px;font-weight:400;fill:#5B6472}
      .small{font-size:11px;font-weight:400;fill:#5B6472}
      .tiny{font-size:9px;font-weight:500;fill:#5B6472}
      .panel{fill:#fff;stroke:#C9D1D9;stroke-width:1.2}
      .soft{fill:#F7F9FB;stroke:#C9D1D9;stroke-width:1}
      .grid{stroke:#E6EBF0;stroke-width:1}
      .axis{stroke:#1B1F23;stroke-width:1.1}
      .wire{fill:none;stroke:#7A869A;stroke-width:1.8;marker-end:url(#arrowGray)}
      .wireBlue{fill:none;stroke:#0072B2;stroke-width:2;marker-end:url(#arrowBlue)}
      .wireGreen{fill:none;stroke:#009E73;stroke-width:2;marker-end:url(#arrowGreen)}
      .dash{stroke-dasharray:6 6}
    </style>

  </defs>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <text class="title" x="64" y="58">Parallel MAPPO Self-Play Training</text>
  <text class="subtitle" x="66" y="86">A reproducible loop connects vectorized training, checkpoint selection, strict replay and geometry audits.</text>

  <rect class="soft" x="64.0" y="126.0" width="1468.0" height="650.0" rx="10.0"/>
  <rect class="panel" x="100.0" y="220.0" width="340.0" height="380.0" rx="6.0"/>
  <text class="label" x="130.0" y="260.0" text-anchor="start">Vectorized rule environments</text>
  <text class="body" x="130.0" y="305.0" text-anchor="start">32 parallel matches</text>
<text class="body" x="130.0" y="327.0" text-anchor="start">fast Python rule model</text>
<text class="body" x="130.0" y="349.0" text-anchor="start">domain randomization</text>
<text class="body" x="130.0" y="371.0" text-anchor="start">legal-shot masking</text>
  <g transform="translate(130 430)">
    <rect x="0" y="0" width="52" height="52" fill="#fff" stroke="#C9D1D9"/>
    <rect x="66" y="0" width="52" height="52" fill="#fff" stroke="#C9D1D9"/>
    <rect x="132" y="0" width="52" height="52" fill="#fff" stroke="#C9D1D9"/>
    <text class="small" x="210" y="32">...</text>
  </g>
  <path class="wireBlue" d="M440.0 410.0 L590.0 410.0"/>
  <rect class="panel" x="590.0" y="220.0" width="360.0" height="380.0" rx="6.0"/>
  <text class="label" x="630.0" y="260.0" text-anchor="start">MAPPO update</text>
  <text class="body" x="630.0" y="305.0" text-anchor="start">centralized critic</text>
<text class="body" x="630.0" y="327.0" text-anchor="start">decentralized actors</text>
<text class="body" x="630.0" y="349.0" text-anchor="start">GAE advantage estimate</text>
<text class="body" x="630.0" y="371.0" text-anchor="start">clipped PPO objective</text>
  <rect x="640" y="455" width="260" height="70" rx="6" fill="#fff" stroke="#0072B2"/>
  <text class="body" x="670.0" y="498.0" text-anchor="start">actor + critic gradients</text>
  <path class="wireGreen" d="M950.0 410.0 L1100.0 410.0"/>
  <rect class="panel" x="1100.0" y="220.0" width="340.0" height="380.0" rx="6.0"/>
  <text class="label" x="1140.0" y="260.0" text-anchor="start">Audited replay</text>
  <text class="body" x="1140.0" y="305.0" text-anchor="start">strict geometry checks</text>
<text class="body" x="1140.0" y="327.0" text-anchor="start">trajectory trace</text>
<text class="body" x="1140.0" y="349.0" text-anchor="start">three-view IsaacLab videos</text>
<text class="body" x="1140.0" y="371.0" text-anchor="start">rule-contract reports</text>
  <path class="wire dash" d="M1270 600 C1270 720 270 720 270 600"/>
  <text class="body" x="610.0" y="725.0" text-anchor="start">failed audits feed back into geometry, reward and action-shield revisions</text>

</svg>
