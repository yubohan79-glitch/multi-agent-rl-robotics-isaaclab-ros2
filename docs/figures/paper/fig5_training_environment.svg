<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1100" viewBox="0 0 1900 1100">
  <defs>
    <style>
      .bg{fill:#fff}.title{font:700 38px Arial,Inter,sans-serif;fill:#111827}.sub{font:500 16px Arial,Inter,sans-serif;fill:#64748b}.h{font:700 22px Arial,Inter,sans-serif;fill:#1f2937}.mh{font:700 16px Arial,Inter,sans-serif;fill:#334155}.txt{font:500 14px Arial,Inter,sans-serif;fill:#475569}.small{font:600 12px Arial,Inter,sans-serif;fill:#475569}.tiny{font:700 10px Arial,Inter,sans-serif;fill:#475569}.eq{font:600 15px Consolas,Menlo,monospace;fill:#111827}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.sim{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.buffer{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}.learn{fill:#faf5ff;stroke:#7c3aed;stroke-width:2}.exec{fill:#fff7ed;stroke:#f59e0b;stroke-width:2}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.8}.event{fill:#fff;stroke:#16a34a;stroke-width:1.7}.penalty{fill:#fff1f2;stroke:#e11d48;stroke-width:1.7}
      .arena{fill:#fff;stroke:#334155;stroke-width:2}.grid{stroke:#dbeafe;stroke-width:.8;stroke-dasharray:3 4}.wall{fill:none;stroke:#94a3b8;stroke-width:4}.obs{fill:#fee2e2;stroke:#ef4444;stroke-width:1.2;stroke-dasharray:4 3}.robotY{fill:#f2c94c;stroke:#92400e;stroke-width:1.2}.robotB{fill:#2563eb;stroke:#1e3a8a;stroke-width:1.2}.target{fill:#fff;stroke:#334155;stroke-width:1.3}
      .arrow{fill:none;stroke:#64748b;stroke-width:3;marker-end:url(#ad)}.arrowB{fill:none;stroke:#2563eb;stroke-width:4;marker-end:url(#ab)}.arrowG{fill:none;stroke:#16a34a;stroke-width:4;marker-end:url(#ag)}.arrowV{fill:none;stroke:#7c3aed;stroke-width:4;marker-end:url(#av)}.arrowY{fill:none;stroke:#d6a90e;stroke-width:3.5;marker-end:url(#ay)}.dash{stroke-dasharray:9 8}.green{fill:#15803d}.red{fill:#be123c}.blue{fill:#1d4ed8}.violet{fill:#6d28d9}.yellow{fill:#a16207}
      .tableLine{stroke:#e2e8f0;stroke-width:1.5}.nn{fill:#fff;stroke:#94a3b8;stroke-width:1.5}
    </style>
    <marker id="ad" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#64748b"/></marker>
    <marker id="ab" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#16a34a"/></marker>
    <marker id="av" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#7c3aed"/></marker>
    <marker id="ay" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#d6a90e"/></marker>
    <g id="arenaCell">
      <rect class="arena" x="0" y="0" width="128" height="92"/>
      <path class="grid" d="M42 0 V92 M84 0 V92 M0 31 H128 M0 62 H128"/>
      <path class="wall" d="M0 0 H128 V92 H0 Z"/>
      <rect x="0" y="0" width="23" height="23" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
      <rect x="105" y="69" width="23" height="23" fill="#fef3c7" stroke="#d6a90e" stroke-width="1.2"/>
      <rect class="obs" x="48" y="30" width="17" height="17"/><rect class="obs" x="75" y="48" width="17" height="17"/>
      <circle class="target" cx="64" cy="5" r="5"/><circle class="target" cx="123" cy="45" r="5"/><circle class="target" cx="5" cy="45" r="5"/><circle class="target" cx="64" cy="87" r="5"/>
      <path class="robotB" d="M42 23 l-18 -8 l18 -8 z"/><path class="robotY" d="M86 66 l18 8 l-18 8 z"/>
      <rect x="9" y="8" width="14" height="10" rx="2" fill="#fff" stroke="#111827" stroke-width="1.2" transform="rotate(-25 16 13)"/>
      <rect x="106" y="74" width="14" height="10" rx="2" fill="#fff" stroke="#111827" stroke-width="1.2" transform="rotate(-25 113 79)"/>
    </g>
  </defs>
  <rect class="bg" width="1900" height="1100"/>
  <text class="title" x="72" y="64">Parallel Self-Play Training Environment</text>
  <text class="sub" x="74" y="98">Vectorized RoboCup duel arenas generate dense rule events; MAPPO trains with global-state critics and deploys local observation actors.</text>
  <rect class="panel" x="54" y="132" width="1792" height="876" rx="14"/>

  <g transform="translate(88 178)">
    <rect class="sim" x="0" y="0" width="626" height="690" rx="12"/>
    <text class="h" x="26" y="42">A. N Parallel RoboCup Arenas</text>
    <text class="txt" x="26" y="70">each environment randomizes physics, sensing, target visibility, and opponent initial policy</text>
    <g transform="translate(34 118)">
      <g transform="translate(0 0)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_1 friction 0.72</text><text class="tiny" x="64" y="112" text-anchor="middle">hard-corner start</text></g>
      <g transform="translate(182 0)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_2 tag yaw +8</text><text class="tiny" x="64" y="112" text-anchor="middle">base rush sample</text></g>
      <g transform="translate(364 0)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_3 latency 55 ms</text><text class="tiny" x="64" y="112" text-anchor="middle">block route sample</text></g>
      <g transform="translate(0 172)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_4 camera noise</text><text class="tiny" x="64" y="112" text-anchor="middle">target occlusion</text></g>
      <g transform="translate(182 172)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_5 wheel slip</text><text class="tiny" x="64" y="112" text-anchor="middle">collision recovery</text></g>
      <g transform="translate(364 172)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_6 obstacle shift</text><text class="tiny" x="64" y="112" text-anchor="middle">armor break route</text></g>
      <g transform="translate(0 344)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_7 low light</text><text class="tiny" x="64" y="112" text-anchor="middle">delayed fire</text></g>
      <g transform="translate(182 344)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">...</text><text class="tiny" x="64" y="112" text-anchor="middle">population mix</text></g>
      <g transform="translate(364 344)"><use href="#arenaCell"/><text class="tiny blue" x="64" y="-12" text-anchor="middle">env_N hard seed</text><text class="tiny" x="64" y="112" text-anchor="middle">timeout pressure</text></g>
    </g>
    <g transform="translate(34 626)">
      <rect class="card" x="0" y="0" width="148" height="40" rx="6"/><text class="small" x="74" y="25" text-anchor="middle">vector reset</text>
      <rect class="card" x="168" y="0" width="148" height="40" rx="6"/><text class="small" x="242" y="25" text-anchor="middle">rule engine</text>
      <rect class="card" x="336" y="0" width="148" height="40" rx="6"/><text class="small" x="410" y="25" text-anchor="middle">sensor model</text>
      <rect class="card" x="504" y="0" width="74" height="40" rx="6"/><text class="small" x="541" y="25" text-anchor="middle">GPU</text>
    </g>
  </g>

  <path class="arrowG" d="M724 520 H784"/>

  <g transform="translate(790 188)">
    <rect class="buffer" x="0" y="0" width="348" height="670" rx="12"/>
    <text class="h" x="28" y="42">B. Rollout Buffer</text>
    <text class="txt" x="28" y="70">two-agent trajectories with rule events</text>
    <g transform="translate(30 114)">
      <rect class="card" x="0" y="0" width="288" height="164" rx="8"/>
      <text class="mh green" x="24" y="32">trajectory tensor</text>
      <line class="tableLine" x1="20" y1="54" x2="266" y2="54"/><line class="tableLine" x1="20" y1="92" x2="266" y2="92"/><line class="tableLine" x1="20" y1="130" x2="266" y2="130"/>
      <text class="eq" x="24" y="82">o_y, o_b</text><text class="eq" x="154" y="82">a_y, a_b</text>
      <text class="eq" x="24" y="120">r_y, r_b</text><text class="eq" x="154" y="120">done, value</text>
      <text class="eq" x="24" y="150">logp_y, logp_b</text>
    </g>
    <g transform="translate(30 336)">
      <text class="mh" x="0" y="0">rule-event rewards</text>
      <rect class="event" x="0" y="24" width="132" height="38" rx="6"/><text class="small" x="66" y="48" text-anchor="middle">normal hit</text>
      <rect class="event" x="154" y="24" width="132" height="38" rx="6"/><text class="small" x="220" y="48" text-anchor="middle">armor removed</text>
      <rect class="event" x="0" y="80" width="132" height="38" rx="6"/><text class="small" x="66" y="104" text-anchor="middle">base hit win</text>
      <rect class="penalty" x="154" y="80" width="132" height="38" rx="6"/><text class="small red" x="220" y="104" text-anchor="middle">own-target fire</text>
      <rect class="event" x="0" y="136" width="286" height="38" rx="6"/><text class="small" x="143" y="160" text-anchor="middle">collision recovery success</text>
    </g>
    <g transform="translate(30 558)">
      <rect class="card" x="0" y="0" width="288" height="68" rx="8"/><text class="mh" x="24" y="30">advantage targets</text><text class="eq green" x="24" y="54">A_hat_t = GAE(r, V, done)</text>
    </g>
  </g>

  <path class="arrowV" d="M1150 520 H1210"/>

  <g transform="translate(1216 178)">
    <rect class="learn" x="0" y="0" width="564" height="690" rx="12"/>
    <text class="h" x="28" y="42">C. MAPPO Update</text>
    <text class="txt" x="28" y="70">centralized training, decentralized execution</text>
    <g transform="translate(44 114)">
      <rect class="card" x="0" y="0" width="202" height="98" rx="8"/><text class="mh yellow" x="101" y="30" text-anchor="middle">yellow actor</text><text class="eq" x="101" y="62" text-anchor="middle">pi_y(o_y)</text>
      <g transform="translate(34 76)"><circle class="nn" cx="0" cy="0" r="7"/><circle class="nn" cx="30" cy="-12" r="7"/><circle class="nn" cx="30" cy="12" r="7"/><circle class="nn" cx="62" cy="0" r="7"/><path d="M7 0 L23 -12 M7 0 L23 12 M37 -12 L55 0 M37 12 L55 0" stroke="#94a3b8" stroke-width="1.2"/></g>
      <rect class="card" x="282" y="0" width="202" height="98" rx="8"/><text class="mh blue" x="383" y="30" text-anchor="middle">blue actor</text><text class="eq" x="383" y="62" text-anchor="middle">pi_b(o_b)</text>
      <g transform="translate(316 76)"><circle class="nn" cx="0" cy="0" r="7"/><circle class="nn" cx="30" cy="-12" r="7"/><circle class="nn" cx="30" cy="12" r="7"/><circle class="nn" cx="62" cy="0" r="7"/><path d="M7 0 L23 -12 M7 0 L23 12 M37 -12 L55 0 M37 12 L55 0" stroke="#94a3b8" stroke-width="1.2"/></g>
      <path class="arrowV" d="M101 108 C120 158 180 176 242 190"/><path class="arrowV" d="M383 108 C364 158 304 176 242 190"/>
    </g>
    <g transform="translate(120 310)">
      <rect x="0" y="0" width="320" height="122" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="10 7"/>
      <text class="h violet" x="160" y="38" text-anchor="middle">centralized critic</text><text class="eq" x="160" y="72" text-anchor="middle">V(s_global)</text><text class="tiny violet" x="160" y="98" text-anchor="middle">training only: global state + both trajectories</text>
    </g>
    <g transform="translate(52 500)">
      <rect class="card" x="0" y="0" width="200" height="82" rx="8"/><text class="mh" x="100" y="30" text-anchor="middle">advantage</text><text class="eq" x="100" y="58" text-anchor="middle">A_hat_t</text>
      <rect class="card" x="306" y="0" width="200" height="82" rx="8"/><text class="mh" x="406" y="30" text-anchor="middle">PPO objective</text><text class="eq" x="406" y="58" text-anchor="middle">L_clip(theta)</text>
      <path class="arrowV" d="M200 41 H306"/>
    </g>
    <path class="arrowV" d="M280 432 V494"/><path class="arrowV" d="M280 582 V628"/>
    <rect class="card" x="132" y="628" width="300" height="48" rx="8"/><text class="mh violet" x="282" y="659" text-anchor="middle">updated policy parameters</text>
  </g>

  <path class="arrowY dash" d="M1500 880 C1200 965 842 958 392 875"/><text class="tiny yellow" x="930" y="958" text-anchor="middle">updated actors broadcast to all parallel arenas</text>

  <g transform="translate(88 910)">
    <rect class="card" x="0" y="0" width="626" height="58" rx="8"/>
    <circle cx="28" cy="29" r="10" fill="#f2c94c" stroke="#92400e" stroke-width="1.5"/><text class="small" x="48" y="34">yellow agent</text>
    <circle cx="154" cy="29" r="10" fill="#2563eb" stroke="#1e3a8a" stroke-width="1.5"/><text class="small" x="174" y="34">blue agent</text>
    <rect class="obs" x="288" y="20" width="18" height="18"/><text class="small" x="318" y="34">randomized obstacle</text>
    <circle class="target" cx="456" cy="29" r="8"/><text class="small" x="474" y="34">AprilTag target</text>
  </g>
  <g transform="translate(1216 910)">
    <rect class="exec" x="0" y="0" width="564" height="58" rx="8"/>
    <text class="mh" x="24" y="25">CTDE execution rule</text>
    <text class="txt" x="24" y="46">Training critic uses global state; deployed robots use local observations only.</text>
  </g>
</svg>
