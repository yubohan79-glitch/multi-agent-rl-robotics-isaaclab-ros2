<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg{fill:#fff}.title{font:700 38px Arial,Inter,sans-serif;fill:#111827}.sub{font:500 16px Arial,Inter,sans-serif;fill:#64748b}.h{font:700 23px Arial,Inter,sans-serif;fill:#1f2937}.mh{font:700 16px Arial,Inter,sans-serif;fill:#334155}.txt{font:500 14px Arial,Inter,sans-serif;fill:#475569}.small{font:600 12px Arial,Inter,sans-serif;fill:#475569}.tiny{font:700 10.5px Arial,Inter,sans-serif;fill:#475569}.eq{font:600 16px Consolas,Menlo,monospace;fill:#111827}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2}.policy{fill:#fffbeb;stroke:#d6a90e;stroke-width:2}.critic{fill:#faf5ff;stroke:#7c3aed;stroke-width:2;stroke-dasharray:10 7}.deploy{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.state{fill:#fff;stroke:#64748b;stroke-width:2}.rec{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}.fire{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.low{fill:#f8fafc;stroke:#64748b;stroke-width:2}.safe{fill:#fff1f2;stroke:#e11d48;stroke-width:2}.loc{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}
      .arrow{fill:none;stroke:#64748b;stroke-width:3;marker-end:url(#ad)}.arrowY{fill:none;stroke:#d6a90e;stroke-width:4;marker-end:url(#ay)}.arrowB{fill:none;stroke:#2563eb;stroke-width:4;marker-end:url(#ab)}.arrowG{fill:none;stroke:#16a34a;stroke-width:4;marker-end:url(#ag)}.arrowR{fill:none;stroke:#e11d48;stroke-width:4;marker-end:url(#ar)}.dash{stroke-dasharray:9 8}.violet{fill:#6d28d9}.red{fill:#be123c}.green{fill:#15803d}.blue{fill:#1d4ed8}.yellow{fill:#a16207}
      .nn{fill:#fff;stroke:#94a3b8;stroke-width:1.6}.bus{fill:#f1f5f9;stroke:#94a3b8;stroke-width:2}
    </style>
    <marker id="ad" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#64748b"/></marker>
    <marker id="ay" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#d6a90e"/></marker>
    <marker id="ab" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#16a34a"/></marker>
    <marker id="ar" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0 L13 6.5 L0 13 Z" fill="#e11d48"/></marker>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="72" y="64">Hierarchical Policy with CTDE Self-Play</text>
  <text class="sub" x="74" y="98">The learned layer chooses tactics; the rule-aware state machine and classical ROS2 controllers preserve safety, timing, and sim-to-real executability.</text>

  <rect class="panel" x="58" y="130" width="1684" height="890" rx="14"/>

  <g transform="translate(94 172)">
    <text class="h" x="0" y="0">A. CTDE tactical layer</text>
    <rect class="card" x="0" y="28" width="1612" height="260" rx="10"/>
    <g transform="translate(34 72)">
      <rect class="policy" x="0" y="0" width="300" height="164" rx="8"/>
      <text class="mh" x="24" y="34">Local observations</text>
      <text class="txt" x="24" y="66">target status, armor state</text>
      <text class="txt" x="24" y="94">time remaining, opponent estimate</text>
      <text class="txt" x="24" y="122">localization confidence</text>
      <path class="arrowY" d="M300 82 H374"/>
      <rect class="deploy" x="374" y="0" width="310" height="164" rx="8"/>
      <text class="mh blue" x="398" y="34">Decentralized actors</text>
      <text class="eq" x="398" y="72">pi_y(o_y), pi_b(o_b)</text>
      <g transform="translate(404 102)">
        <circle class="nn" cx="0" cy="0" r="10"/><circle class="nn" cx="40" cy="-18" r="10"/><circle class="nn" cx="40" cy="18" r="10"/><circle class="nn" cx="86" cy="0" r="10"/>
        <path d="M10 0 L30 -18 M10 0 L30 18 M50 -18 L76 0 M50 18 L76 0" stroke="#94a3b8" stroke-width="1.5"/>
      </g>
      <text class="small" x="528" y="112">target, rush, break, block, recover</text>
      <path class="arrow dash" d="M684 82 H782"/>
      <rect class="critic" x="782" y="-18" width="370" height="198" rx="8"/>
      <text class="mh violet" x="812" y="22">centralized critic V(s_global)</text>
      <text class="txt" x="812" y="54">training only: both robots, contacts, full target state</text>
      <text class="eq" x="812" y="98">A_hat_t = GAE(r, V, done)</text>
      <rect x="812" y="126" width="140" height="34" rx="5" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text class="small" x="882" y="148" text-anchor="middle">PPO clip</text>
      <rect x="972" y="126" width="144" height="34" rx="5" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text class="small" x="1044" y="148" text-anchor="middle">entropy bonus</text>
      <path class="arrowY" d="M684 122 C744 210 930 226 1130 188"/>
      <text class="small yellow" x="910" y="226" text-anchor="middle">policy update during training</text>
      <rect class="bus" x="1210" y="12" width="292" height="138" rx="8"/>
      <text class="mh" x="1234" y="44">Deployment boundary</text>
      <text class="txt" x="1234" y="76">critic removed</text>
      <text class="txt" x="1234" y="104">each robot executes pi_i(o_i)</text>
      <text class="txt" x="1234" y="132">ROS2 action contract unchanged</text>
      <path class="arrowB" d="M1152 82 H1210"/>
    </g>
  </g>

  <g transform="translate(94 492)">
    <text class="h" x="0" y="0">B. Rule-aware behavior state machine</text>
    <rect class="card" x="0" y="28" width="1612" height="280" rx="10"/>
    <g transform="translate(42 82)">
      <rect class="state" x="0" y="0" width="112" height="48" rx="8"/><text class="small" x="56" y="30" text-anchor="middle">INIT</text>
      <rect class="state" x="160" y="0" width="142" height="48" rx="8"/><text class="small" x="231" y="30" text-anchor="middle">NAVIGATE</text>
      <rect class="state" x="350" y="0" width="126" height="48" rx="8"/><text class="small" x="413" y="30" text-anchor="middle">SEARCH</text>
      <rect class="state" x="524" y="0" width="116" height="48" rx="8"/><text class="small" x="582" y="30" text-anchor="middle">ALIGN</text>
      <rect class="fire" x="688" y="0" width="106" height="48" rx="8"/><text class="small red" x="741" y="30" text-anchor="middle">FIRE</text>
      <rect class="state" x="842" y="0" width="150" height="48" rx="8"/><text class="small" x="917" y="30" text-anchor="middle">NEXT_TARGET</text>
      <rect class="state" x="1060" y="-58" width="154" height="48" rx="8"/><text class="small" x="1137" y="-28" text-anchor="middle">RETURN_HOME</text>
      <rect class="state" x="1060" y="58" width="116" height="48" rx="8"/><text class="small" x="1118" y="88" text-anchor="middle">END</text>
      <rect class="rec" x="462" y="132" width="228" height="52" rx="8"/><text class="small green" x="576" y="164" text-anchor="middle">RECOVER_LOCALIZATION</text>
      <path class="arrow" d="M112 24 H160"/><path class="arrow" d="M302 24 H350"/><path class="arrow" d="M476 24 H524"/><path class="arrowR" d="M640 24 H688"/><path class="arrow" d="M794 24 H842"/>
      <path class="arrow" d="M992 14 C1024 -4 1034 -36 1060 -36"/><path class="arrow" d="M992 34 C1024 52 1032 82 1060 82"/>
      <path class="arrowG" d="M582 48 C586 86 580 108 576 132"/>
      <path class="arrowG" d="M462 158 C300 158 260 84 231 48"/>
      <text class="tiny green" x="708" y="166">low confidence / stuck / collision</text>
    </g>
    <g transform="translate(1310 62)">
      <rect class="safe" x="0" y="0" width="238" height="70" rx="8"/><text class="mh red" x="119" y="28" text-anchor="middle">Safety gate</text><text class="small red" x="119" y="52" text-anchor="middle">opponent target only</text>
      <rect class="policy" x="0" y="96" width="238" height="52" rx="8"/><text class="mh yellow" x="119" y="129" text-anchor="middle">learned tactic</text>
      <rect class="deploy" x="0" y="166" width="238" height="52" rx="8"/><text class="mh blue" x="119" y="199" text-anchor="middle">ROS2 command</text>
    </g>
  </g>

  <g transform="translate(94 834)">
    <text class="h" x="0" y="0">C. Engineered low-level stack and hardware contract</text>
    <rect class="card" x="0" y="28" width="1612" height="142" rx="10"/>
    <g transform="translate(32 68)">
      <rect class="deploy" x="0" y="0" width="190" height="64" rx="8"/><text class="mh blue" x="95" y="27" text-anchor="middle">Nav2 tracking</text><text class="small" x="95" y="48" text-anchor="middle">NavigateToPose</text>
      <rect class="deploy" x="232" y="0" width="206" height="64" rx="8"/><text class="mh blue" x="335" y="27" text-anchor="middle">diff-drive control</text><text class="small" x="335" y="48" text-anchor="middle">/cmd_vel</text>
      <rect class="deploy" x="480" y="0" width="202" height="64" rx="8"/><text class="mh blue" x="581" y="27" text-anchor="middle">AprilTag align</text><text class="small" x="581" y="48" text-anchor="middle">bearing + range</text>
      <rect class="safe" x="724" y="0" width="190" height="64" rx="8"/><text class="mh red" x="819" y="27" text-anchor="middle">shooter timing</text><text class="small red" x="819" y="48" text-anchor="middle">/shooter/fire</text>
      <rect class="loc" x="956" y="0" width="190" height="64" rx="8"/><text class="mh green" x="1051" y="27" text-anchor="middle">EKF fusion</text><text class="small" x="1051" y="48" text-anchor="middle">odom + imu</text>
      <rect class="safe" x="1188" y="0" width="190" height="64" rx="8"/><text class="mh red" x="1283" y="27" text-anchor="middle">fire mask</text><text class="small red" x="1283" y="48" text-anchor="middle">no own-target</text>
      <rect class="low" x="1420" y="0" width="126" height="64" rx="8"/><text class="mh" x="1483" y="27" text-anchor="middle">base</text><text class="small" x="1483" y="48" text-anchor="middle">motors/sensors</text>
      <path class="arrowB" d="M190 32 H232"/><path class="arrowB" d="M438 32 H480"/><path class="arrowR" d="M682 32 H724"/><path class="arrowG" d="M914 32 H956"/><path class="arrowR" d="M1146 32 H1188"/><path class="arrow" d="M1378 32 H1420"/>
    </g>
  </g>
  <path class="arrowY" d="M900 460 V520"/><text class="small yellow" x="920" y="496">selected tactic</text>
  <path class="arrowG" d="M900 802 V862"/><text class="small green" x="920" y="838">safe executable command</text>
</svg>
