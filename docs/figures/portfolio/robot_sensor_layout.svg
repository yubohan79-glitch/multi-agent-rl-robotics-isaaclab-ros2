<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#7A869A"/></marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#0072B2"/></marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#009E73"/></marker>

    <style>
      text{font-family:Inter,Arial,Helvetica,sans-serif}
      .title{font-size:34px;font-weight:700;fill:#1B1F23}
      .subtitle{font-size:15px;font-weight:400;fill:#5B6472}
      .label{font-size:15px;font-weight:650;fill:#1B1F23}
      .body{font-size:13px;font-weight:400;fill:#5B6472}
      .small{font-size:11px;font-weight:400;fill:#5B6472}
      .tiny{font-size:9px;font-weight:500;fill:#5B6472}
      .panel{fill:#fff;stroke:#C9D1D9;stroke-width:1.2}
      .soft{fill:#F7F9FB;stroke:#C9D1D9;stroke-width:1}
      .grid{stroke:#E6EBF0;stroke-width:1}
      .axis{stroke:#1B1F23;stroke-width:1.1}
      .wire{fill:none;stroke:#7A869A;stroke-width:1.8;marker-end:url(#arrowGray)}
      .wireBlue{fill:none;stroke:#0072B2;stroke-width:2;marker-end:url(#arrowBlue)}
      .wireGreen{fill:none;stroke:#009E73;stroke-width:2;marker-end:url(#arrowGreen)}
      .dash{stroke-dasharray:6 6}
    </style>

  </defs>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <text class="title" x="64" y="58">Robot Sensor and Actuation Layout</text>
  <text class="subtitle" x="66" y="86">Deployment observes only real ROS2 sensor signals; no privileged simulator state is required.</text>

  <rect class="soft" x="64.0" y="126.0" width="1468.0" height="650.0" rx="10.0"/>
  <g transform="translate(320 210)">
    <rect x="210" y="120" width="390" height="250" rx="36" fill="#FFFFFF" stroke="#1B1F23" stroke-width="2.5"/>
    <rect x="245" y="154" width="320" height="182" rx="24" fill="#F7F9FB" stroke="#C9D1D9" stroke-width="1.5"/>
    <circle cx="290" cy="370" r="46" fill="#FFFFFF" stroke="#1B1F23" stroke-width="2"/>
    <circle cx="520" cy="370" r="46" fill="#FFFFFF" stroke="#1B1F23" stroke-width="2"/>
    <rect x="385" y="86" width="44" height="70" rx="8" fill="#0072B2"/>
    <line x1="407" y1="86" x2="407" y2="20" stroke="#0072B2" stroke-width="2"/>
    <path d="M280 178 L122 80" class="wireBlue"/>
    <path d="M510 178 L724 86" class="wireBlue"/>
    <path d="M565 260 L785 260" class="wireGreen"/>
    <path d="M290 320 L118 476" class="wire"/>
    <path d="M520 320 L726 476" class="wire"/>
    <path d="M405 210 L405 32" stroke="#56B4E9" stroke-width="2" stroke-dasharray="5 5"/>
  </g>
  <rect class="panel" x="95.0" y="210.0" width="260.0" height="108.0" rx="6.0"/>
  <text class="label" x="125.0" y="250.0" text-anchor="start">RGB camera + AprilTag</text>
  <text class="body" x="125.0" y="282.0" text-anchor="start">visual target detection</text>
<text class="body" x="125.0" y="304.0" text-anchor="start">front alignment</text>
  <rect class="panel" x="1110.0" y="210.0" width="280.0" height="108.0" rx="6.0"/>
  <text class="label" x="1140.0" y="250.0" text-anchor="start">2D lidar / costmap</text>
  <text class="body" x="1140.0" y="282.0" text-anchor="start">clearance</text>
<text class="body" x="1140.0" y="304.0" text-anchor="start">obstacle avoidance</text>
  <rect class="panel" x="1180.0" y="420.0" width="260.0" height="108.0" rx="6.0"/>
  <text class="label" x="1210.0" y="460.0" text-anchor="start">ToF + bumper</text>
  <text class="body" x="1210.0" y="492.0" text-anchor="start">contact state</text>
<text class="body" x="1210.0" y="514.0" text-anchor="start">pushable boxes</text>
  <rect class="panel" x="92.0" y="600.0" width="300.0" height="108.0" rx="6.0"/>
  <text class="label" x="122.0" y="640.0" text-anchor="start">Wheel odom + IMU</text>
  <text class="body" x="122.0" y="672.0" text-anchor="start">motion consistency</text>
<text class="body" x="122.0" y="694.0" text-anchor="start">drift-risk estimate</text>
  <rect class="panel" x="1088.0" y="600.0" width="340.0" height="108.0" rx="6.0"/>
  <text class="label" x="1118.0" y="640.0" text-anchor="start">Fixed laser module</text>
  <text class="body" x="1118.0" y="672.0" text-anchor="start">range-gated firing</text>
<text class="body" x="1118.0" y="694.0" text-anchor="start">0.80 s dwell</text>

